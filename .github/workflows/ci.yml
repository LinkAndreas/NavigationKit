name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DESTINATION: platform=iOS Simulator,name=iPhone 17 Pro

jobs:
  test:
    name: Test NavigationKit
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme NavigationKit-Package \
            -destination 'platform=iOS Simulator,name=iPhone 17'

  build-example:
    name: Build ShowCaseApp example
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build example app
        run: |
          xcodebuild build \
            -project Examples/ShowCaseApp/ShowCaseApp.xcodeproj \
            -scheme ShowCaseApp \
            -destination "$DESTINATION"

  docs:
    name: Build documentation
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build DocC documentation
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation --target NavigationKit \
            --output-path ./docs \
            --transform-for-static-hosting
