name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    branches: [main]


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DESTINATION: platform=iOS Simulator,name=iPhone 17
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test NavigationKit
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme NavigationKit-Package \
            -destination "$DESTINATION"

  build-example:
    name: Build ShowCaseApp example
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Build example app
        run: |
          xcodebuild build \
            -project Examples/ShowCaseApp/ShowCaseApp.xcodeproj \
            -scheme ShowCaseApp \
            -platform ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  docs:
    name: Build documentation
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Build DocC documentation
        run: |
          xcodebuild docbuild \
            -scheme NavigationKit-Package \
            -destination "$DESTINATION" \
            -derivedDataPath ./.derivedData \
            DOCC_HOSTING_BASE_PATH=NavigationKit
            
          $(xcrun --find docc) process-archive transform-for-static-hosting \
            ./.derivedData/Build/Products/Debug-iphonesimulator/NavigationKit.doccarchive \
            --output-path ./docs \
            --hosting-base-path NavigationKit
            
          # Fix DocC root routing for GitHub Pages
          cp ./docs/index.html ./docs/404.html
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=documentation/navigationkit"></head><body></body></html>' > ./docs/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './docs'

      - name: Cleanup generated files
        run: rm -rf .derivedData docs

  deploy-docs:
    name: Deploy documentation
    needs: docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
